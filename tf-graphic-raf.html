<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RAF · Refer a Friend</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Barlow Condensed',sans-serif; background:#111; min-height:100vh; }
.card { width:1080px; height:1080px; background:#0a0a0a; position:relative; overflow:hidden; display:flex; flex-direction:column; flex-shrink:0; }
.top-bar,.bottom-bar { position:absolute; left:0; right:0; height:7px; background:linear-gradient(90deg,#00cc66,#00ff88 50%,#00cc66); }
.top-bar { top:0; } .bottom-bar { bottom:0; }
.v-rule { position:absolute; top:7px; bottom:7px; width:1px; background:linear-gradient(180deg,transparent,rgba(0,204,102,.25) 20%,rgba(0,204,102,.25) 80%,transparent); }
.v-rule.left { left:64px; } .v-rule.right { right:64px; }
.tf-logo { width:220px; height:220px; object-fit:contain; flex-shrink:0; }
.footer-url { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:16px; color:#444; letter-spacing:5px; text-transform:uppercase; text-align:center; }
.page-wrap { display:flex; justify-content:center; padding:32px; background:#111; min-height:calc(100vh - 60px); }
.controls { background:#1a1a1a; border-bottom:1px solid #222; padding:16px 24px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.btn { background:#00cc66; color:#000; font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:13px; letter-spacing:1px; padding:8px 18px; border:none; border-radius:6px; cursor:pointer; }
.btn:hover { opacity:.85; }
.hint { font-size:11px; color:#444; letter-spacing:1px; margin-left:auto; white-space:nowrap; }

.raf-inner { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; padding:44px 80px; text-align:center; }
.raf-eyebrow { font-size:18px; font-weight:900; color:#00cc66; letter-spacing:6px; text-transform:uppercase; margin-bottom:16px; }
.raf-headline { font-family:'Bebas Neue',sans-serif; font-size:110px; line-height:.88; letter-spacing:2px; color:#fff; margin-bottom:8px; }
.raf-headline span { color:#00cc66; }
.raf-sub { font-size:26px; color:#555; letter-spacing:3px; text-transform:uppercase; margin-bottom:48px; }
.steps-row { display:flex; gap:32px; justify-content:center; margin-bottom:48px; width:100%; }
.step { flex:1; background:rgba(0,204,102,0.07); border:1px solid rgba(0,204,102,0.25); border-radius:14px; padding:28px 20px; display:flex; flex-direction:column; align-items:center; gap:12px; }
.step-num { font-family:'Bebas Neue',sans-serif; font-size:56px; color:#00cc66; line-height:1; }
.step-text { font-size:19px; font-weight:700; color:#c0c0c0; line-height:1.3; letter-spacing:0.5px; }
.earn-box { background:#00cc66; color:#000; font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:3px; padding:18px 56px; border-radius:10px; margin-bottom:32px; }

@media print {
  body { background:#0a0a0a !important; margin:0; padding:0; }
  .controls, .hint, #saveJpegBtn { display:none !important; }
  .page-wrap { padding:0 !important; background:#0a0a0a !important; justify-content:flex-start !important; }
  .card { box-shadow:none !important; page-break-inside:avoid; }
  @page { size:1080px 1080px; margin:0; }
}
</style>
</head>
<body>
<div class="controls">
  <span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:#00cc66;letter-spacing:2px;flex-shrink:0;">RAF · Refer a Friend</span>
  <span class="hint">Screenshot the card · 1080×1080</span>
</div>
<div class="page-wrap">
  <div class="card" id="card">
    <div class="top-bar"></div><div class="bottom-bar"></div>
    <div class="v-rule left"></div><div class="v-rule right"></div>

    <div class="raf-inner">

      <div class="raf-eyebrow">💰 Refer a Friend</div>

      <div class="raf-headline">
        EARN UP<br>TO <span>£14</span><br>PER PLAYER
      </div>

      <div class="raf-sub">Refer a Friend to Total Footy</div>

      <div class="steps-row">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">Send your link to your football friends</div>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">They sign up to Total Footy</div>
        </div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">Your balance is credited as they play!</div>
        </div>
      </div>

      <div class="earn-box">JOIN FREE · EARN AS THEY PLAY</div>

      <div class="footer-url">totalfooty.co.uk</div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<button id="saveJpegBtn" onclick="saveJpeg()" style="
  position:fixed;top:24px;right:24px;z-index:9999;
  background:linear-gradient(135deg,#00cc66 0%,#00ff88 50%,#00cc66 100%);
  color:#000;border:none;border-radius:6px;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  padding:10px 22px;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,204,102,.4);
  transition:opacity .2s;
">⬇ Save JPEG</button>
<script>
function saveJpeg() {
  var btn = document.getElementById('saveJpegBtn');
  btn.textContent = 'Saving…';
  btn.style.opacity = '0.6';
  btn.style.pointerEvents = 'none';
  var card = document.querySelector('.card');
  // Strip gradient pseudo-elements workaround
  var styleEl = document.createElement('style');
  styleEl.textContent = '.top-bar,.bottom-bar{background:#00cc66 !important;}.v-rule{background:rgba(0,204,102,.25) !important;}';
  document.head.appendChild(styleEl);
  html2canvas(card, { scale:1, useCORS:true, backgroundColor:'#0a0a0a', width:1080, height:1080 }).then(function(canvas) {
    document.head.removeChild(styleEl);
    var link = document.createElement('a');
    link.download = 'tf-raf-refer-a-friend.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    link.click();
    btn.textContent = '⬇ Save JPEG';
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  });
}
</script>
</body>
</html>
